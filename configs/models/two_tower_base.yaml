# Two-tower 모델의 기본 hyperparameter.
# 설계 근거는 reports/03_baseline_methodology.md §1, §2 참조.

name: two_tower_base

architecture:
  embed_dim_id: 64                    # ID embedding 차원
  embed_dim_out: 128                  # 두 tower 의 최종 출력 차원 (= ANN dim)
  mlp_hidden: 256
  recent_n: 50                        # user 의 최근 N 개 positive 를 mean-pool
  l2_normalize: true
  share_item_embedding: true          # user tower 의 recent_item 과 item tower 가 ItemEmbedding 공유

loss:
  type: sampled_softmax_in_batch_neg_with_logq
  temperature: 0.07
  logq_correction: true                # false 로 두면 logQ 보정 비활성화
  logq_sketch_size: 1048576           # 2^20 count-min sketch buckets

optimizer:
  type: adamw
  lr: 1.0e-3
  weight_decay: 1.0e-4
  betas: [0.9, 0.999]

scheduler:
  type: cosine
  warmup_steps: 1000

training:
  batch_size: 4096                     # 데이터셋 별로 experiments/*.yaml 에서 override
  max_epochs: 10
  early_stop_metric: recall_at_100
  early_stop_patience_epochs: 3
  precision: bf16
  grad_clip_norm: 1.0
  num_workers: 8
  seed: 42

eval:
  val_ks: [10, 100]
  val_metric_for_early_stop: recall_at_100
