# Phase 1 v1 — quality 개선 hyperparameter.
# 자세한 변경 사항: configs/models/two_tower_v1.yaml 상단.

experiment_id: phase1_v1
description: |
  Phase 1 baseline v0 의 Recall@100=0.18 미달을 해결하기 위한 v1.
  capacity 증가 (dim 128→256), batch 8192, temperature 0.1, logQ off.

datasets:
  - configs/datasets/ml25m.yaml
  - configs/datasets/amazon_beauty.yaml

model: configs/models/two_tower_v1.yaml

retrievers:
  - configs/retrievers/faiss_hnsw_cpu.yaml
  - configs/retrievers/cuvs_ivfpq.yaml
  - configs/retrievers/cuvs_cagra.yaml

evaluation:
  ks: [10, 100]
  latency:
    mode: both
    concurrencies: [1, 4, 16, 64]
    warmup_queries: 1000
    min_measured_queries: 10000
    min_measured_seconds: 30
  power:
    sample_interval_ms: 100
    baseline_idle_seconds: 5

cost_model: configs/cost_model.yaml

reporting:
  output_dir: results/phase1_v1
  generate_markdown: reports/baseline_results.md
  generate_figures: reports/figures/
