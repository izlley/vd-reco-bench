# cuVS CAGRA — GPU baseline 의 속도 측. VDPU 의 진짜 경쟁.
# reports/03_baseline_methodology.md §3 참조.

name: cuvs_cagra
impl: reco_bench.retrievers.cuvs_cagra:CuvsCagra

device: cuda

build:
  graph_degree: 64
  intermediate_graph_degree: 96
  build_algo: nn_descent              # cuVS 24.10 default
  metric: inner_product

search:
  # itopk_size 는 max(ks) 이상이어야 한다 (cuVS CAGRA 제약).
  # ks=[10, 100] 이므로 minimum 128.
  itopk_grid: [128, 256, 512, 1024]
  max_iterations: 0                   # 0 = auto

sweep_axes:
  graph_degree: [32, 64, 128]
